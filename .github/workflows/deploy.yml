name: Building and Deploying bmtech.pe website

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: clone
        uses: actions/checkout@v3

      - name: install 
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: dependencies
        run: npm ci

      - name: build angular
        run: npm run build -- --configuration=production

      - name: deploy with rsync
        uses: burnett01/rsync-deployments@v8
        with:
          switches: >-
            -avzr
            --delete
            --filter='P certs/'
            --filter='P repositorio/'
          path: dist/bmtech-v2/browser/
          remote_path: /var/www/bmtech.pe
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}